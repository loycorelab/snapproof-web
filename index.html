<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapProof - รายละเอียดของรูปภาพ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        /* ป้ายสถานะเขียวเมื่อข้อมูลถูกต้อง */
        .badge-success {
            background-color: #e6f7ed;
            color: #1f874c;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        /* 🔥 ป้ายสถานะแดงเตือนเมื่อลิงก์โดนโจรแก้ไข (ซ่อนไว้ก่อน) */
        .badge-error {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            border: 2px solid #ef4444;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .info-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #e2e8f0;
        }
        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        .value {
            color: #0f172a;
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-android {
            background-color: #0f172a;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.15);
        }
        .btn-android:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }
        .btn-ios {
            background-color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status-ok" class="badge-success" style="display: none;">🟢 รายละเอียดของรูปภาพ</div>
    <div id="status-error" class="badge-error">🔴 ข้อมูลถูกดัดแปลง!<br>ไม่ใช่รูปภาพจริงจากแอป</div>
    
    <div id="main-content">
        <div class="info-card">
            <div class="info-item">
                <span class="label">ข้อความลายน้ำ :</span> 
                <span class="value" id="view-text">กำลังโหลด...</span>
            </div>
            <div class="info-item">
                <span class="label">วันที่ :</span> 
                <span class="value" id="view-date">กำลังโหลด...</span>
            </div>
            <div class="info-item">
                <span class="label">เวลา :</span> 
                <span class="value" id="view-time">กำลังโหลด...</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://play.google.com/store/apps/details?id=com.loycorelab.snapproof" id="android-btn" class="btn btn-android">
                Download for Android
            </a>
            <a href="#" id="ios-btn" class="btn btn-ios">
                Download for iOS (Coming Soon)
            </a>
        </div>
    </div>
</div>

<script>
    // ⚠️ กุญแจลับสำหรับระบบ Anti-Tampering (ต้องตรงกับที่จะใส่ในแอป Android คืนนี้)
    const SECRET_KEY = "SnapProof_Secret_2026";

    // 1. แกะค่าพารามิเตอร์ทั้งหมดรวมถึง signature จาก URL
    const urlParams = new URLSearchParams(window.location.search);
    const text = urlParams.get('t') || "";
    const date = urlParams.get('d') || "";
    const time = urlParams.get('m') || "";
    const signature = urlParams.get('s') || "";

    // 2. ตรวจสอบความถูกต้องของข้อมูล
    if (text && date && time && signature) {
        const combinedData = text + date + time + SECRET_KEY;
        const hashedData = CryptoJS.SHA256(combinedData).toString();

        if (hashedData === signature) {
            // ✅ รหัสตรงกัน = ของแท้
            document.getElementById('view-text').innerText = text;
            document.getElementById('view-date').innerText = date;
            document.getElementById('view-time').innerText = time;
            document.getElementById('status-ok').style.display = "inline-flex";
        } else {
            // ❌ รหัสไม่ตรง = โดนแอบแก้ URL
            showValidationError();
        }
    } else {
        showValidationError();
    }

    // ฟังก์ชันสั่งสลัดป้ายเขียว ขึ้นป้ายแดง และซ่อนเนื้อหาโฆษณาทั้งหมดเพื่อดัดหลังโจร
    function showValidationError() {
        document.getElementById('status-ok').style.display = "none";
        document.getElementById('status-error').style.display = "inline-flex";
        document.getElementById('main-content').style.display = "none";
    }

    document.getElementById('ios-btn').onclick = function() {
        alert("Verification system works on all devices. Full iOS app is coming soon.");
        return false;
    };
</script>

</body>
</html>
