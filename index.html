<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapProof - รายละเอียดของรูปภาพ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        .badge {
            background-color: #e6f7ed;
            color: #1f874c;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .info-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #e2e8f0;
        }
        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        .value {
            color: #0f172a;
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-android {
            background-color: #0f172a;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.15);
        }
        .btn-android:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }
        .btn-ios {
            background-color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">🟢 รายละเอียดของรูปภาพ</div>
    
    <div class="info-card">
        <div class="info-item">
            <span class="label">ข้อความลายน้ำ :</span> 
            <span class="value" id="view-text">กำลังโหลด...</span>
        </div>
        <div class="info-item">
            <span class="label">วันที่ :</span> 
            <span class="value" id="view-date">กำลังโหลด...</span>
        </div>
        <div class="info-item">
            <span class="label">เวลา :</span> 
            <span class="value" id="view-time">กำลังโหลด...</span>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://play.google.com/store/apps/details?id=com.loycorelab.snapproof" id="android-btn" class="btn btn-android">
            Download จาก Play Store
        </a>
        <a href="#" id="ios-btn" class="btn btn-ios">
            Download จาก App Store (เร็วๆ นี้)
        </a>
    </div>
</div>

<script>
    // ดึงค่าจาก URL มาแสดงผลตรงๆ (text, date, time) รองรับฟอร์แมตเดิมของตัวแอป
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('view-text').innerText = urlParams.get('text') || '-';
    document.getElementById('view-date').innerText = urlParams.get('date') || '-';
    document.getElementById('view-time').innerText = urlParams.get('time') || '-';

    // ตั้งค่าพฤติกรรมปุ่มฝั่ง iOS
    document.getElementById('ios-btn').onclick = function() {
        alert("หน้าเว็บนี้ใช้ตรวจสอบรายละเอียดรูปภาพได้ตามปกติ ส่วนตัวแอปพลิเคชันเต็มสำหรับระบบ iOS กำลังเร่งพัฒนาตามมาครับ");
        return false;
    };
</script>

</body>
</html>
